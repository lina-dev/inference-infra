apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      serviceAccountName: scheduler
      containers:
        - name: scheduler
          image: inference-infra/scheduler:latest
          env:
            - name: SQS_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: worker-secrets
                  key: sqs-queue-url
            - name: WORKER_NAMESPACE
              value: "inference"
            - name: WORKER_DEPLOYMENT
              value: "worker"
            - name: SCALE_UP_THRESHOLD
              value: "5"
            - name: SCALE_DOWN_THRESHOLD
              value: "0"
            - name: MIN_REPLICAS
              value: "1"
            - name: MAX_REPLICAS
              value: "20"
            - name: AWS_REGION
              value: "us-east-1"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scheduler
  namespace: inference
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/scheduler-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scheduler-role
  namespace: inference
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scheduler-rolebinding
  namespace: inference
subjects:
  - kind: ServiceAccount
    name: scheduler
    namespace: inference
roleRef:
  kind: Role
  name: scheduler-role
  apiGroup: rbac.authorization.k8s.io
