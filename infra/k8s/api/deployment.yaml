apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: inference
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: worker
      containers:
        - name: api
          image: inference-infra/api:latest
          ports:
            - containerPort: 8080
          env:
            - name: SQS_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: worker-secrets
                  key: sqs-queue-url
            - name: AWS_REGION
              value: "us-east-1"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: inference
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
