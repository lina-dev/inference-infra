apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton-whisper
  namespace: triton
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triton-whisper
  template:
    metadata:
      labels:
        app: triton-whisper
    spec:
      containers:
        - name: triton
          image: nvcr.io/nvidia/tritonserver:24.01-py3
          args:
            - tritonserver
            - --model-repository=/models
            - --grpc-port=8001
            - --http-port=8000
            - --metrics-port=8002
          ports:
            - containerPort: 8001
              name: grpc
            - containerPort: 8000
              name: http
            - containerPort: 8002
              name: metrics
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
              cpu: "2"
              memory: "8Gi"
          volumeMounts:
            - name: model-store
              mountPath: /models
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: model-store
          persistentVolumeClaim:
            claimName: triton-model-store
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: triton-service
  namespace: triton
spec:
  selector:
    app: triton-whisper
  ports:
    - name: grpc
      port: 8001
      targetPort: 8001
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: triton-hpa
  namespace: triton
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: triton-whisper
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: triton-model-store
  namespace: triton
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: efs-sc
